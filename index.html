<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="lock.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding:
    max(28px, env(safe-area-inset-top))
    max(20px, env(safe-area-inset-right))
    max(60px, env(safe-area-inset-bottom))
    max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}
.dash-title {
  margin: 0 0 14px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}
.tile {
  --accent: var(--success);
  position: relative;
  min-width: 0;
  display: flex;
  flex-direction: column;
  padding: 22px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  color: var(--text-primary);
  text-decoration: none;
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 45%, rgba(255,255,255,0.08));
  background: rgba(255, 255, 255, 0.052);
}
.tile.big { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }
.tile-num {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
}
.tile-icon {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 30px;
  line-height: 1;
  filter: grayscale(100%) brightness(1.24) drop-shadow(0 0 18px var(--accent));
  opacity: 0.9;
}
.tile-spacer { flex: 1; min-height: 22px; }
.tile-title {
  margin: 0 0 8px;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--text-primary);
}
.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}
.tile-subtitle {
  min-width: 0;
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tile-arrow {
  flex: 0 0 auto;
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 18px;
  line-height: 1;
  transition: transform 0.18s ease;
}
.tile:hover .tile-arrow { transform: translateX(4px); }

@media (max-width: 720px) {
  .bento-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .tile.big { grid-column: span 2; grid-row: span 1; }
}
@media (max-width: 480px) {
  .dash-title { font-size: 22px; }
}
@media (max-width: 440px) {
  .bento-grid { grid-template-columns: 1fr; }
  .tile.big,
  .tile.wide { grid-column: span 1; grid-row: span 1; }
}
</style>
</head>
<body>
<main class="page">
  <h1 class="dash-title">Dashboard</h1>
  <section class="bento-grid" aria-label="Dashboard sections">
    <a class="tile big" href="main.html" style="--accent:#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-icon">🏠</span>
      <span class="tile-spacer"></span>
      <h2 class="tile-title">Main</h2>
      <span class="tile-footer">
        <span class="tile-subtitle">Goals & daily plan</span>
        <span class="tile-arrow">→</span>
      </span>
    </a>
    <a class="tile wide" href="gym.html" style="--accent:#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-icon">💪</span>
      <span class="tile-spacer"></span>
      <h2 class="tile-title">Fitness</h2>
      <span class="tile-footer">
        <span class="tile-subtitle">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </span>
    </a>
    <a class="tile" href="health.html" style="--accent:#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-icon">💊</span>
      <span class="tile-spacer"></span>
      <h2 class="tile-title">Health</h2>
      <span class="tile-footer">
        <span class="tile-subtitle">Supplements & vitals</span>
        <span class="tile-arrow">→</span>
      </span>
    </a>
    <a class="tile" href="po-water.html" style="--accent:#60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-icon">💧</span>
      <span class="tile-spacer"></span>
      <h2 class="tile-title">Water</h2>
      <span class="tile-footer">
        <span class="tile-subtitle">Hydration</span>
        <span class="tile-arrow">→</span>
      </span>
    </a>
    <a class="tile wide" href="finance.html" style="--accent:#F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-icon">📊</span>
      <span class="tile-spacer"></span>
      <h2 class="tile-title">Finance</h2>
      <span class="tile-footer">
        <span class="tile-subtitle">Net worth & spending</span>
        <span class="tile-arrow">→</span>
      </span>
    </a>
  </section>
</main>
</body>
</html>
